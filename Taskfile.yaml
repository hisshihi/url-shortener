version: '3'

vars:
  BIN: ./bin/app
  BIN_DIR: '{{.ROOT_DIR}}/bin'
  GOOSE: '{{.BIN_DIR}}/goose'

tasks:
  default:
    desc: Run all checks and build
    cmds:
      - task: gen
      - task: fmt
      - task: lint
      - task: test
      - task: build
      - task: migrate:up
      - task: migrate:down


  run:
    desc: Run the application
    cmds:
      - go run ./cmd/app

  migrate:up:
    desc: "Накатывает все миграции"
    dotenv: [ '.env' ]
    cmds:
      - 'goose up'

  migrate:down:
    desc: 'Откатывание миграции'
    dotenv: [ '.env' ]
    cmds:
      - 'goose down'

  goose:status:
    desc: 'Вывести статус миграций'
    dotenv: [ '.env' ]
    cmds:
      - 'goose status'

  build:
    desc: Build the binary
    cmds:
      - go build -o {{.BIN}} .

  test:
    desc: Run tests with race detector
    cmds:
      - go test -race -v -cover -count=100 ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code and tidy mod
    cmds:
      - go fmt ./...
      - go mod tidy

  gen:
    desc: Run go generate
    cmds:
      - go generate ./...

  proto:
    desc: Generate protobuf and gRPC code
    sources:
      - proto/*.proto
    generates:
      - pb/*.go
    cmds:
      - rm -rf pb/*
      - |
        protoc --proto_path=proto --go_out=pb --go-opt=paths=source_relative \
            --go-grpc_out=pb --go-grpc_opt=paths=source_relative \
            proto/*.proto

  evans:
    desc: Start Evans REPL
    cmds:
      - evans --port 9092 --host localhost --path proto --proto verify.proto repl

  clean:
    desc: Clean binaries and coverage
    cmds:
      - rm -rf bin/
      - rm -f coverage.out coverage.html
      - go clean